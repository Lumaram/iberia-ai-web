<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IBERIA-AI.COM | Infraestructura Soberana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #020609; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #pcb-container { position: fixed; width: 100vw; height: 100vh; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .page-container { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }
        .glass { background: rgba(2, 6, 9, 0.94); backdrop-filter: blur(16px); border-bottom: 1px solid #1a1a1a; }
        .hero-gradient { background: linear-gradient(to bottom, #ffffff 40%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-iberia { background: #3b82f6; transition: 0.3s; font-weight: 800; font-size: 11px; border-radius: 2px; letter-spacing: 0.2em; }
    </style>
</head>
<body>
    <div id="pcb-container"><canvas id="pcb-canvas"></canvas></div>
    
    <div class="page-container">
        <header class="h-20 flex items-center justify-between px-10 glass shrink-0">
            <div class="flex items-center space-x-12">
                <h1 class="text-2xl font-black tracking-tighter text-blue-500 mono">IBERIA-AI.COM</h1>
                <nav class="flex space-x-8">
                    <span class="text-[11px] font-800 uppercase tracking-widest text-blue-500">Inicio</span>
                    <span class="text-[11px] font-800 uppercase tracking-widest text-gray-500">Marketplace</span>
                    <span class="text-[11px] font-800 uppercase tracking-widest text-gray-500">Estadísticas</span>
                </nav>
            </div>
            <button class="bg-blue-600 px-8 py-3 rounded-sm font-black text-[11px] uppercase tracking-widest">Registrarse</button>
        </header>

        <main class="flex-1 flex flex-col items-center justify-center text-center px-10">
            <h2 class="text-7xl font-black mb-8 hero-gradient uppercase leading-none">Potencia de cómputo <br> sin fronteras</h2>
            <p class="text-gray-400 text-xl font-medium max-w-2xl mx-auto mb-16 uppercase tracking-[0.2em] mono">
                Infraestructura GPU descentralizada <br> bajo normativa europea.
            </p>
            <div class="flex gap-6">
                <button class="btn-iberia px-12 py-5 uppercase text-white">Explorar Marketplace</button>
                <button class="border border-white/10 px-12 py-5 uppercase text-white hover:bg-white/5 transition">Ver Whitepaper</button>
            </div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('pcb-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, spark;
        const traces = [];
        const capacitors = [];

        class Segment {
            constructor(x1, y1, x2, y2) {
                this.x1 = x1; this.y1 = y1; this.x2 = x2; this.y2 = y2;
                this.children = [];
                if (Math.random() > 0.8) capacitors.push({x: x2, y: y2, charge: 0});
            }
            draw() {
                ctx.strokeStyle = 'rgba(59, 130, 246, 0.07)';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(this.x1, this.y1); ctx.lineTo(this.x2, this.y2); ctx.stroke();
                this.children.forEach(c => c.draw());
            }
        }

        function generateGridCircuit() {
            const step = 100;
            const root = new Segment(width/2, height/2, width/2 + step, height/2);
            
            function grow(node, d) {
                if (d <= 0) return;
                const dirs = [[0, step], [0, -step], [step, 0], [-step, 0]];
                const num = Math.floor(Math.random() * 2) + 1;
                for(let i=0; i<num; i++) {
                    const pick = dirs[Math.floor(Math.random() * dirs.length)];
                    const nextX = node.x2 + pick[0];
                    const nextY = node.y2 + pick[1];
                    if (nextX > 0 && nextX < width && nextY > 0 && nextY < height) {
                        const child = new Segment(node.x2, node.y2, nextX, nextY);
                        node.children.push(child);
                        grow(child, d - 1);
                    }
                }
            }
            grow(root, 15); // Aumentada profundidad para cubrir todo
            return root;
        }

        class Spark {
            constructor(root) { this.root = root; this.reset(); }
            reset() { this.curr = this.root; this.t = 0; }
            update() {
                this.t += 0.02;
                if (this.t >= 1) {
                    if (this.curr.children.length > 0) {
                        this.curr = this.curr.children[Math.floor(Math.random() * this.curr.children.length)];
                        this.t = 0;
                        capacitors.forEach(c => {
                            if(Math.abs(c.x - this.curr.x1) < 2 && Math.abs(c.y - this.curr.y1) < 2) c.charge = 1;
                        });
                    } else { this.reset(); }
                }
            }
            draw() {
                const x = this.curr.x1 + (this.curr.x2 - this.curr.x1) * this.t;
                const y = this.curr.y1 + (this.curr.y2 - this.curr.y1) * this.t;
                ctx.fillStyle = '#3b82f6';
                ctx.shadowBlur = 20; ctx.shadowColor = '#3b82f6';
                ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            capacitors.length = 0;
            unifiedRoot = generateGridCircuit();
            spark = new Spark(unifiedRoot);
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 6, 9, 0.08)'; // Estela persistente
            ctx.fillRect(0, 0, width, height);
            unifiedRoot.draw();
            capacitors.forEach(c => {
                if(c.charge > 0) {
                    ctx.fillStyle = `rgba(59, 130, 246, ${c.charge})`;
                    ctx.fillRect(c.x-5, c.y-5, 10, 10);
                    c.charge *= 0.96;
                }
            });
            spark.update(); spark.draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
