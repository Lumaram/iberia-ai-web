<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IBERIA-AI.COM | Infraestructura Soberana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #020609; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #pcb-container { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .page-container { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }
        .glass { background: rgba(2, 6, 9, 0.94); backdrop-filter: blur(16px); border-bottom: 1px solid #1a1a1a; }
        .nav-link { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; color: #444; cursor: pointer; }
        .nav-link.active { color: #3b82f6; text-shadow: 0 0 12px rgba(59, 130, 246, 0.6); }
        .hero-title { font-size: clamp(3rem, 7vw, 5.5rem); line-height: 0.9; letter-spacing: -0.05em; }
        .hero-gradient { background: linear-gradient(to bottom, #ffffff 40%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-iberia { background: #3b82f6; transition: 0.3s; font-weight: 800; font-size: 11px; padding: 1.25rem 3rem; text-transform: uppercase; letter-spacing: 0.2em; border-radius: 2px; }
        .btn-outline { border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; font-weight: 800; font-size: 11px; padding: 1.25rem 3rem; text-transform: uppercase; letter-spacing: 0.2em; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="pcb-container"><canvas id="pcb-canvas"></canvas></div>
    <div class="page-container">
        <header class="h-20 flex items-center justify-between px-10 glass shrink-0">
            <div class="flex items-center space-x-12">
                <h1 class="text-2xl font-black tracking-tighter text-blue-500 mono">IBERIA-AI.COM</h1>
                <nav class="flex space-x-8">
                    <span class="nav-link active">Inicio</span><span class="nav-link">Marketplace</span><span class="nav-link">Estadísticas</span><span class="nav-link">White Paper</span>
                </nav>
            </div>
            <div class="flex items-center space-x-6">
                <button class="text-[11px] font-bold text-gray-500 uppercase tracking-widest hover:text-white transition">Login</button>
                <button class="bg-blue-600 px-8 py-3 rounded-sm font-black text-[11px] uppercase tracking-widest text-white">Registrarse</button>
            </div>
        </header>
        <main class="flex-1 flex flex-col items-center justify-center text-center px-10">
            <h2 class="hero-title font-black mb-8 hero-gradient uppercase">Potencia de cómputo <br> sin fronteras</h2>
            <p class="text-gray-400 text-lg md:text-xl font-medium max-w-2xl mx-auto mb-16 uppercase tracking-[0.2em] mono leading-relaxed">
                Infraestructura GPU descentralizada <br> de alto rendimiento bajo normativa europea.
            </p>
            <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                <button class="btn-iberia text-white">Explorar Marketplace</button>
                <button class="btn-outline text-white hover:bg-white/5">Ver Whitepaper</button>
            </div>
        </main>
        <footer class="h-12 glass flex items-center justify-center text-[10px] font-black tracking-[0.5em] text-gray-600 uppercase">© 2026 IBERIA-AI.COM</footer>
    </div>

    <script>
        const canvas = document.getElementById('pcb-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, unifiedRoot, spark;
        const capacitors = [];

        class Segment {
            constructor(x, y, length, dir) {
                this.x1 = x; this.y1 = y;
                this.x2 = dir === 'H' ? x + length : x;
                this.y2 = dir === 'V' ? y + length : y;
                this.dir = dir;
                this.children = [];
                if (Math.random() > 0.7) capacitors.push({x: this.x2, y: this.y2, charge: 0});
            }
            draw() {
                ctx.strokeStyle = 'rgba(59, 130, 246, 0.06)';
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(this.x1, this.y1); ctx.lineTo(this.x2, this.y2); ctx.stroke();
                this.children.forEach(c => c.draw());
            }
        }

        function generateTree(x, y, len, depth) {
            const dir = Math.random() > 0.5 ? 'H' : 'V';
            const sign = Math.random() > 0.5 ? 1 : -1;
            const node = new Segment(x, y, len * sign, dir);
            if (depth > 0) {
                const branches = Math.floor(Math.random() * 2) + 1;
                for (let i = 0; i < branches; i++) {
                    node.children.push(generateTree(node.x2, node.y2, len * 0.85, depth - 1));
                }
            }
            return node;
        }

        class Spark {
            constructor() { this.reset(); }
            reset() { this.curr = unifiedRoot; this.t = 0; this.speed = 0.012; }
            update() {
                this.t += this.speed;
                if (this.t >= 1) {
                    if (this.curr.children.length > 0) {
                        this.curr = this.curr.children[Math.floor(Math.random() * this.curr.children.length)];
                        this.t = 0;
                        capacitors.forEach(c => {
                            if (Math.abs(c.x - this.curr.x1) < 2 && Math.abs(c.y - this.curr.y1) < 2) c.charge = 1;
                        });
                    } else { this.reset(); }
                }
            }
            draw() {
                const x = this.curr.x1 + (this.curr.x2 - this.curr.x1) * this.t;
                const y = this.curr.y1 + (this.curr.y2 - this.curr.y1) * this.t;
                ctx.shadowBlur = 15; ctx.shadowColor = '#3b82f6';
                ctx.fillStyle = '#60a5fa';
                ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            capacitors.length = 0;
            unifiedRoot = generateTree(width / 2, height / 2, 120, 8);
            spark = new Spark();
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 6, 9, 0.06)'; // Estela intensa
            ctx.fillRect(0, 0, width, height);
            unifiedRoot.draw();
            capacitors.forEach(c => {
                if (c.charge > 0) {
                    ctx.fillStyle = `rgba(59, 130, 246, ${c.charge})`;
                    ctx.fillRect(c.x - 4, c.y - 4, 8, 8);
                    c.charge *= 0.95;
                }
            });
            spark.update(); spark.draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize(); animate();
    </script>
</body>
</html>
