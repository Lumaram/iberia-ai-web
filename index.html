<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBERIA-AI.COM | Infraestructura Soberana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { 
            --iberia-blue: #3b82f6; 
            --bg-dark: #020609; 
            --pcb-trace: rgba(59, 130, 246, 0.05); /* Trazas sutiles y unidas */
            --pcb-power: #3b82f6; /* Energía de la chispa única */
        }

        body { background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Contenedor del PCB Dinámico Unificado */
        #pcb-container {
            position: fixed; width: 100%; height: 100%;
            top: 0; left: 0; z-index: 1;
            pointer-events: none;
        }

        .page-container { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }
        .glass { background: rgba(2, 6, 9, 0.92); backdrop-filter: blur(16px); border-bottom: 1px solid #1a1a1a; }
        
        /* Navegación */
        .nav-link { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; color: #444; transition: 0.3s; cursor: pointer; }
        .nav-link.active { color: var(--iberia-blue); text-shadow: 0 0 12px rgba(59, 130, 246, 0.6); }
        
        .hero-title {
            font-size: clamp(3rem, 7vw, 5.5rem);
            line-height: 0.9;
            letter-spacing: -0.05em;
        }

        /* Degradado de texto Iberia */
        .hero-gradient {
            background: linear-gradient(to bottom, #ffffff 40%, var(--iberia-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-iberia { background: var(--iberia-blue); transition: 0.3s; }
        .btn-iberia:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); transform: translateY(-1px); }
    </style>
</head>
<body>
    <div id="pcb-container">
        <canvas id="pcb-canvas"></canvas>
    </div>

    <div class="page-container">
        <header class="h-20 flex items-center justify-between px-10 glass shrink-0 relative z-50">
            <div class="flex items-center space-x-12">
                <h1 class="text-2xl font-black tracking-tighter text-blue-500 mono">IBERIA-AI.COM</h1>
                <nav class="flex space-x-8">
                    <span class="nav-link active">Inicio</span>
                    <span class="nav-link">Marketplace</span>
                    <span class="nav-link">Estadísticas</span>
                    <span class="nav-link">White Paper</span>
                </nav>
            </div>
            <div class="flex items-center space-x-6">
                <button class="text-[11px] font-bold text-gray-500 uppercase tracking-widest hover:text-white">Login</button>
                <button class="btn-iberia px-8 py-3 rounded-sm font-black text-[11px] uppercase tracking-widest text-white">Registrarse</button>
            </div>
        </header>

        <main class="flex-1 flex flex-col items-center justify-center text-center px-10 relative z-40">
            <div class="max-w-5xl">
                <h2 class="hero-title font-black mb-8 hero-gradient">
                    POTENCIA DE CÓMPUTO <br> SIN FRONTERAS
                </h2>
                <p class="text-gray-400 text-lg md:text-xl font-medium max-w-2xl mx-auto mb-16 uppercase tracking-[0.2em] mono leading-relaxed">
                    Infraestructura GPU descentralizada <br> de alto rendimiento bajo normativa europea.
                </p>
                
                <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                    <button class="btn-iberia px-12 py-5 font-black text-xs uppercase tracking-[0.2em] text-white rounded-sm">
                        Explorar Marketplace
                    </button>
                    <button class="border border-white/10 px-12 py-5 font-black text-xs uppercase tracking-[0.2em] text-white rounded-sm hover:bg-white/5 transition">
                        Ver Whitepaper
                    </button>
                </div>
            </div>
        </main>

        <footer class="h-12 glass flex items-center justify-center text-[10px] font-black tracking-[0.5em] text-gray-600 uppercase">
            © 2026 IBERIA-AI.COM | INFRAESTRUCTURA DE CÓMPUTO SOBERANO
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('pcb-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        let unifiedTrace;
        let singleSpark;

        class TraceSegment {
            constructor(x, y, angle, length) {
                this.startX = x;
                this.startY = y;
                this.endX = x + Math.cos(angle) * length;
                this.endY = y + Math.sin(angle) * length;
                this.children = [];
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.startX, this.startY);
                ctx.lineTo(this.endX, this.endY);
                ctx.strokeStyle = 'rgba(59, 130, 246, 0.05)'; // Trazas sutiles unidas
                ctx.lineWidth = 1;
                ctx.stroke();
                this.children.forEach(child => child.draw());
            }
        }

        class SingleSpark {
            constructor(rootTrace) {
                this.root = rootTrace;
                this.currentSegment = rootTrace;
                this.t = 0; // Progreso en el segmento actual
                this.speed = 0.015; // Velocidad de la chispa única
                this.size = 2.5;
                this.reset();
            }

            reset() {
                this.currentSegment = this.root;
                this.t = 0;
            }

            update() {
                this.t += this.speed;
                if (this.t >= 1) {
                    if (this.currentSegment.children.length > 0) {
                        // Elegir una rama aleatoria
                        this.currentSegment = this.currentSegment.children[Math.floor(Math.random() * this.currentSegment.children.length)];
                        this.t = 0;
                    } else {
                        // Fin del camino, reiniciar
                        this.reset();
                    }
                }
            }

            draw() {
                const x = this.currentSegment.startX + (this.currentSegment.endX - this.currentSegment.startX) * this.t;
                const y = this.currentSegment.startY + (this.currentSegment.endY - this.currentSegment.startY) * this.t;

                // Chispa principal
                ctx.fillStyle = '#3b82f6';
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Estela (se logra mediante el renderizado acumulativo en animate())
            }
        }

        // Generar un circuito unificado tipo "árbol"
        function generateUnifiedTrace(x, y, angle, length, depth) {
            const trace = new TraceSegment(x, y, angle, length);
            if (depth > 0) {
                // Generar ramas con giros estrictos de 90º
                const numBranches = Math.random() > 0.3 ? 2 : 1;
                for (let i = 0; i < numBranches; i++) {
                    const nextAngle = angle + (Math.random() > 0.5 ? Math.PI / 2 : -Math.PI / 2);
                    const nextLen = length * 0.8;
                    trace.children.push(generateUnifiedTrace(trace.endX, trace.endY, nextAngle, nextLen, depth - 1));
                }
            }
            return trace;
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // Generar circuito unificado desde el centro
            unifiedTrace = generateUnifiedTrace(width / 2, height / 2, Math.random() * Math.PI * 2, 100, 6);
            singleSpark = new SingleSpark(unifiedTrace);
        }

        function animate() {
            // Renderizado acumulativo para la estela (trail)
            // Dibuja una capa negra semitransparente sobre el frame anterior
            ctx.fillStyle = 'rgba(2, 6, 9, 0.1)'; // Controla la duración de la estela
            ctx.fillRect(0, 0, width, height);

            // Dibujar el circuito estático sutil
            unifiedTrace.draw();

            // Actualizar y dibujar la chispa única
            singleSpark.update();
            singleSpark.draw();

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
