<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBERIA-AI.COM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020609; color: white; margin: 0; font-family: sans-serif; overflow-x: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; }
        .content { position: relative; z-index: 10; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .glass { background: rgba(10, 20, 40, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(0, 112, 243, 0.3); }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="content min-h-screen flex flex-col p-6 md:p-12">
        <header class="flex justify-between items-center p-6 glass rounded-2xl mb-12">
            <h1 class="text-xl font-bold tracking-tighter text-blue-500">IBERIA-AI.COM</h1>
            <button class="interactive bg-blue-600 px-6 py-2 rounded-full font-bold text-sm">ACCESO VIP</button>
        </header>

        <main class="flex-grow flex flex-col items-center justify-center text-center">
            <h2 class="text-5xl md:text-7xl font-extrabold mb-6">Alta Fidelidad de <span class="text-blue-500">Cómputo IA</span></h2>
            <p class="text-gray-400 max-w-2xl mb-12 text-lg">La oferta genera la demanda. Conectamos potencia GPU con proyectos globales.</p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
                <div class="glass p-10 rounded-3xl text-left border-l-4 border-blue-500">
                    <h3 class="text-2xl font-bold mb-4">Para Renters</h3>
                    <p class="text-gray-400 mb-8">Alquila tus equipos y genera ingresos pasivos.</p>
                    <button class="interactive w-full py-4 bg-white text-black font-bold rounded-xl">ALQUILAR EQUIPO</button>
                </div>
                <div class="glass p-10 rounded-3xl text-left border-l-4 border-gray-700">
                    <h3 class="text-2xl font-bold mb-4">Para Proyectos</h3>
                    <p class="text-gray-400 mb-8">Cómputo dedicado bajo jurisdicción segura.</p>
                    <button class="interactive w-full py-4 border border-gray-700 font-bold rounded-xl">SOLICITAR CÓMPUTO</button>
                </div>
            </div>
        </main>

        <footer class="mt-12 text-center text-gray-600 text-xs tracking-widest uppercase">
            © 2026 IBERIA-AI.COM · SOBERANÍA TECNOLÓGICA
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        window.onload = function() {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 100 },
                    "color": { "value": "#0070f3" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.5 },
                    "size": { "value": 2 },
                    "line_linked": { "enable": true, "distance": 150, "color": "#0070f3", "opacity": 0.4, "width": 1 },
                    "move": { "enable": true, "speed": 2 }
                },
                "interactivity": {
                    "events": { "onhover": { "enable": true, "mode": "grab" } }
                }
            });
        };
    </script>
</body>
</html>
