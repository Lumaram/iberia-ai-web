<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBERIA-AI.COM | Potencia de Cómputo Soberana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { 
            --iberia-blue: #3b82f6; 
            --bg-dark: #020609; 
            --pcb-trace-color: rgba(59, 130, 246, 0.08); /* Líneas sutiles de fondo */
            --pcb-power-color: #3b82f6; /* Energía circulando */
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow: hidden; 
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Capa de Circuito Impreso Dinámico */
        #pcb-canvas { 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            top: 0; 
            left: 0; 
            z-index: 1; 
            pointer-events: none; /* Asegura interactividad */
            background-image: 
                radial-gradient(var(--bg-dark) 40%, rgba(2, 6, 9, 0) 70%),
                url('image_6.png'); /* Carga de referencia para estructura estática */
            background-size: cover;
            background-blend-mode: multiply;
            opacity: 0.8; /* Ajuste para sutiliza */
        }

        /* Contenedor Principal */
        .page-container { 
            position: relative; 
            z-index: 10; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        /* Header Transparente con Blur */
        .glass-header { 
            background: rgba(2, 6, 9, 0.9); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .nav-link { 
            font-size: 11px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            color: #555; 
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-link:hover { color: #aaa; }
        .nav-link.active { 
            color: var(--iberia-blue); 
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); 
        }

        /* Hero Section */
        .hero-title {
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 0.9;
            letter-spacing: -0.05em;
        }

        .hero-gradient {
            background: linear-gradient(to bottom, #ffffff 30%, var(--iberia-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: var(--iberia-blue);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }

        .btn-outline {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="pcb-canvas"></canvas>
    
    <div class="page-container">
        <header class="h-20 flex items-center justify-between px-12 glass-header shrink-0">
            <div class="flex items-center space-x-16">
                <h1 class="text-2xl font-black tracking-tighter text-blue-500 mono">IBERIA-AI.COM</h1>
                <nav class="hidden md:flex space-x-10">
                    <span class="nav-link active">Inicio</span>
                    <span class="nav-link">Marketplace</span>
                    <span class="nav-link">Estadísticas</span>
                    <span class="nav-link">White Paper</span>
                </nav>
            </div>
            <div class="flex items-center space-x-8">
                <button class="text-[11px] font-bold text-gray-500 uppercase tracking-widest hover:text-white transition">Login</button>
                <button class="bg-blue-600 px-8 py-3 rounded-sm font-black text-[11px] uppercase tracking-[0.2em] text-white">Registrarse</button>
            </div>
        </header>

        <main class="flex-1 flex flex-col items-center justify-center text-center px-6">
            <div class="max-w-5xl">
                <h2 class="hero-title font-black mb-8 hero-gradient">
                    POTENCIA DE CÓMPUTO <br> SIN FRONTERAS
                </h2>
                <p class="text-gray-400 text-lg md:text-xl font-medium max-w-2xl mx-auto mb-12 uppercase tracking-[0.2em] mono leading-relaxed">
                    Infraestructura GPU descentralizada <br> de alto rendimiento bajo normativa europea.
                </p>
                
                <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                    <button class="btn-primary px-12 py-5 font-black text-xs uppercase tracking-[0.2em] text-white rounded-sm">
                        Explorar Marketplace
                    </button>
                    <button class="btn-outline px-12 py-5 font-black text-xs uppercase tracking-[0.2em] text-white rounded-sm">
                        Ver Whitepaper
                    </button>
                </div>
            </div>
        </main>

        <footer class="h-16 flex items-center justify-between px-12 glass-header text-[10px] font-bold text-gray-600 uppercase tracking-[0.4em]">
            <span>© 2026 IBERIA-AI.COM</span>
            <div class="flex space-x-8">
                <span class="hover:text-blue-500 cursor-pointer transition">Términos</span>
                <span class="hover:text-blue-500 cursor-pointer transition">Privacidad</span>
            </div>
            <span>Status: Online</span>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('pcb-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        const traces = [];
        const numTraces = 60; // Trazas sutiles de fondo
        const numPowerPulses = 15; // Energía circulando

        class Trace {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.length = Math.random() * 150 + 50;
                this.speed = Math.random() * 0.5 + 0.2;
                this.angle = Math.random() * Math.PI * 2;
                this.width = Math.random() * 1 + 0.5;
                this.segments = [];
                this.numSegments = Math.floor(Math.random() * 4 + 2); // De 2 a 5 giros de 90º
                this.powerPosition = -100; // Energía circulando
                this.powerSpeed = Math.random() * 2 + 1;
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                let currentX = this.x;
                let currentY = this.y;

                // Dibujar traza de cobre (estática)
                ctx.strokeStyle = `rgba(59, 130, 246, ${Math.random() * 0.05 + 0.02})`; // Sutil
                ctx.lineWidth = this.width;

                for (let i = 0; i < this.numSegments; i++) {
                    const nextX = currentX + Math.cos(this.angle) * (this.length / this.numSegments);
                    const nextY = currentY + Math.sin(this.angle) * (this.length / this.numSegments);
                    ctx.lineTo(nextX, nextY);
                    
                    // Almacenar segmentos para energía
                    if (this.segments.length < this.numSegments) {
                        this.segments.push({ startX: currentX, startY: currentY, endX: nextX, endY: nextY });
                    }

                    currentX = nextX;
                    currentY = nextY;
                    this.angle += (Math.random() > 0.5 ? 1 : -1) * Math.PI / 2; // Giros de 90º
                }
                ctx.stroke();

                // Dibujar Energía Circulando (Power Flow)
                if (this.powerPosition > -100 && this.powerPosition < 100) {
                    this.drawPowerFlow();
                }
                this.powerPosition += this.powerSpeed;
                if (this.powerPosition > 200) this.powerPosition = -150; // Reiniciar pulso
            }

            drawPowerFlow() {
                const totalLength = this.length;
                let currentPowerX = this.x;
                let currentPowerY = this.y;
                let powerAngle = Math.random() * Math.PI * 2; // Reiniciar ángulo de pulso

                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineWidth = this.width * 1.5;
                ctx.strokeStyle = `rgba(59, 130, 246, ${this.powerPosition < 0 ? (this.powerPosition + 150) / 150 : (200 - this.powerPosition) / 100})`; // Fade in/out

                let distanceRun = 0;
                let startDrawingPower = false;
                
                // Determinar dónde empezar el pulso de energía
                for(let i=0; i < this.numSegments; i++) {
                    const seg = this.segments[i];
                    if(!seg) continue;
                    const segLen = totalLength / this.numSegments;
                    
                    if(distanceRun + segLen > this.powerPosition && !startDrawingPower) {
                        const ratio = (this.powerPosition - distanceRun) / segLen;
                        currentPowerX = seg.startX + (seg.endX - seg.startX) * Math.max(0, ratio);
                        currentPowerY = seg.startY + (seg.endY - seg.startY) * Math.max(0, ratio);
                        ctx.moveTo(currentPowerX, currentPowerY);
                        startDrawingPower = true;
                    }
                    distanceRun += segLen;
                    if(startDrawingPower) {
                        ctx.lineTo(seg.endX, seg.endY);
                    }
                }
                ctx.stroke();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            traces.length = 0;
            for (let i = 0; i < numTraces; i++) {
                traces.push(new Trace());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            traces.forEach(trace => trace.draw());
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
